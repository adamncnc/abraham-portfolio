name: IPO Watch

on:
  schedule:
    # Daily 08:30 Taipei = 00:30 UTC, Mon-Fri
    - cron: "30 0 * * 1-5"
  workflow_dispatch:  # Manual trigger button in Actions tab

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run IPO watcher
        env:
          ABRAHAM_WEBHOOK_URL: ${{ secrets.ABRAHAM_WEBHOOK_URL }}
        run: python scripts/ipo_watcher.py

      - name: Commit state file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update ipo_seen state ${{ github.run_id }} [skip ci]"
          file_pattern: "data/ipo_seen.json"
          commit_user_name: "Abraham Bot"
          commit_user_email: "abraham-bot@users.noreply.github.com"
